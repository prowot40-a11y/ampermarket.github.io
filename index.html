<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Настройка Макропада</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
        #status { margin-top: 20px; font-weight: bold; color: green; }
    </style>
</head>
<body>

    <h2>WebHID Configurator</h2>
    <button id="connectBtn">Подключить Макропад</button>
    <button id="saveBtn" disabled>Записать тестовый бинд (Кнопка 1 = 'A')</button>
    <div id="status">Устройство не подключено</div>

    <script>
        let hidDevice = null;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                // Ищем устройства с нашим Vendor-Defined Usage Page (0xFF00)
                const devices = await navigator.hid.requestDevice({
                    filters: [{ usagePage: 0xFF00 }]
                });
                
                if (devices.length > 0) {
                    hidDevice = devices[0];
                    await hidDevice.open();
                    document.getElementById('status').innerText = `Подключено: ${hidDevice.productName}`;
                    document.getElementById('saveBtn').disabled = false;
                }
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "Ошибка подключения: " + error.message;
                document.getElementById('status').style.color = "red";
            }
        });

        document.getElementById('saveBtn').addEventListener('click', async () => {
            if (!hidDevice) return;

            // Формируем массив из 25 байт (Report Count = 0x19)
            const data = new Uint8Array(25);
            
            data[0] = 0xAA; // Магический байт

            // Заполняем дефолтными значениями (как в keymap.c)
            const defaultKeys = [
                0x1E, 0x1F, 0x20, // 1, 2, 3
                0x21, 0x22, 0x23, // 4, 5, 6
                0x24, 0x25, 0x26, // 7, 8, 9
                0x28, 0x27, 0x2C  // Enter, 0, Space
            ];

            for (let i = 0; i < 12; i++) {
                data[1 + (i * 2)] = 0x00; // Модификатор (без Shift/Ctrl)
                data[1 + (i * 2) + 1] = defaultKeys[i]; // Скан-код
            }

            // ТЕСТ: Меняем первую кнопку (индекс 0) на букву 'A' (Скан-код 0x04)
            data[1] = 0x00; // Модификатор
            data[2] = 0x04; // Буква 'A'

            try {
                // Отправляем на Report ID 2
                await hidDevice.sendReport(2, data);
                document.getElementById('status').innerText = "Настройки успешно записаны! Нажми кнопку 1 на макропаде.";
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "Ошибка записи: " + error.message;
                document.getElementById('status').style.color = "red";
            }
        });
    </script>
</body>
</html>
